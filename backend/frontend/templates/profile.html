{% load static %}
<!doctype html>
<html lang="en">
    <head><meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>Profile & Settings - TaskFlow</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
        <link href="{% static 'css/app.css' %}" rel="stylesheet">
    </head>
    <body>
        <div class="container py-4"><h4 class="mb-3">Profile & Settings</h4>
            <div class="row g-4"><div class="col-lg-5"><div class="glass-card p-4"><h6>Profile</h6><input class="form-control mb-2" value="Divya Pathak">
                <input class="form-control mb-2" value="Product Manager">
                <input class="form-control" value="divya@taskflow.app">
            </div>
        </div>
        <div class="col-lg-7"><div class="glass-card p-4"><h6>Preferences</h6><div class="form-check form-switch mb-2">
            <input class="form-check-input" type="checkbox" id="email">
            <label class="form-check-label" for="email">Email notifications</label>
        </div>
        <div class="form-check form-switch mb-3"><input class="form-check-input" type="checkbox" checked id="weekly">
            <label class="form-check-label" for="weekly">Weekly analytics digest</label>
        </div>
        <button class="btn btn-gradient">Save Changes</button>
    </div>
</div>
</div>
</div>
<script src="{% static 'js/app.js' %}">

</script>
</body>
</html>
