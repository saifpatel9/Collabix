{% extends 'base.html' %}
{% block title %}Reset Password | Collabix{% endblock %}
{% block body_class %}auth-body{% endblock %}
{% block content %}
<section class="auth-wrap"><div class="auth-bg"></div><div class="auth-card"><h3>Reset Password</h3><form class="needs-validation" novalidate><div class="mb-3"><label class="form-label">New Password</label><div class="input-group"><input type="password" class="form-control password-field" required><button class="btn btn-outline-secondary toggle-password" type="button"><i class="fa-regular fa-eye"></i></button></div></div><div class="mb-3"><label class="form-label">Confirm Password</label><div class="input-group"><input type="password" class="form-control password-field" required><button class="btn btn-outline-secondary toggle-password" type="button"><i class="fa-regular fa-eye"></i></button></div></div><button class="btn btn-primary w-100">Reset Password</button></form></div></section>
{% endblock %}
