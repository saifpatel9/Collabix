{% extends 'base.html' %}
{% block title %}Login | Collabix{% endblock %}
{% block body_class %}auth-body{% endblock %}
{% block content %}
<section class="auth-wrap">
  <div class="auth-bg"></div>
  <div class="auth-card">
    <h3>Welcome Back</h3>
    <p class="text-muted">Sign in to continue to your workspace.</p>
    <form class="needs-validation" novalidate>
      <div class="mb-3"><label class="form-label">Email</label><input type="email" class="form-control" required><div class="invalid-feedback">Enter valid email.</div></div>
      <div class="mb-3"><label class="form-label">Password</label><div class="input-group"><input type="password" class="form-control password-field" required><button class="btn btn-outline-secondary toggle-password" type="button"><i class="fa-regular fa-eye"></i></button></div></div>
      <div class="d-flex justify-content-between mb-3"><a href="forgot-password.html" class="small">Forgot password?</a></div>
      <button class="btn btn-primary w-100">Login</button>
    </form>
    <div class="social-row"><button class="btn btn-light"><i class="fa-brands fa-google"></i> Google</button><button class="btn btn-light"><i class="fa-brands fa-microsoft"></i> Microsoft</button></div>
    <p class="small text-center mt-3 mb-0">No account? <a href="register.html">Register</a></p>
  </div>
</section>
{% endblock %}
