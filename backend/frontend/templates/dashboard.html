{% load static %}
<!doctype html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Employer Dashboard - TaskFlow</title>
   <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <link href="{% static 'css/app.css' %}" rel="stylesheet">
    </head>
<body>
<div class="container-fluid app-shell"><div class="row">
  <aside class="col-lg-3 col-xl-2 p-3 sidebar glass-card m-lg-3 mb-3"><h4 class="fw-bold mb-4">Task<span class="gradient-text">Flow</span></h4><nav class="d-grid gap-2"><a class="side-link active" href="employer-dashboard.html"><i class="fa-solid fa-gauge"></i>Dashboard</a><a class="side-link" href="tasks.html"><i class="fa-solid fa-list-check"></i>Tasks</a><a class="side-link" href="projects.html"><i class="fa-solid fa-diagram-project"></i>Projects</a><a class="side-link" href="kanban.html"><i class="fa-solid fa-table-columns"></i>Kanban</a><a class="side-link" href="reports.html"><i class="fa-solid fa-chart-pie"></i>Reports</a><a class="side-link" href="notifications.html"><i class="fa-solid fa-bell"></i>Notifications</a><a class="side-link" href="profile.html"><i class="fa-solid fa-user-gear"></i>Profile</a></nav></aside>
  <main class="col-lg-9 col-xl-10 p-3 p-lg-4"><div class="glass-card p-3 mb-4 d-flex align-items-center gap-3"><div class="top-search flex-grow-1"><input placeholder="Search projects, members, tasks..."></div><button class="btn btn-outline-secondary" data-theme-toggle><i class="fa-regular fa-moon"></i></button><a href="login.html" class="btn btn-gradient">Logout</a></div>
  <div class="row g-4 mb-4" data-aos="fade-up"><div class="col-md-3"><div class="glass-card p-3"><small class="text-secondary">Total Projects</small><h3 class="fw-bold">27</h3></div></div><div class="col-md-3"><div class="glass-card p-3"><small class="text-secondary">Open Tasks</small><h3 class="fw-bold">146</h3></div></div><div class="col-md-3"><div class="glass-card p-3"><small class="text-secondary">Team Members</small><h3 class="fw-bold">58</h3></div></div><div class="col-md-3"><div class="glass-card p-3"><small class="text-secondary">Completion Rate</small><h3 class="fw-bold">91%</h3></div></div></div>
  <div class="row g-4"><div class="col-lg-8" data-aos="fade-up"><div class="glass-card p-4"><h5>Weekly Velocity</h5><canvas id="velocityChart" height="130"></canvas></div></div><div class="col-lg-4" data-aos="fade-up" data-aos-delay="150"><div class="glass-card p-4"><h5>Project Distribution</h5><canvas id="projectChart" height="220"></canvas></div></div></div>
  </main>
</div></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js">
</script><script src="https://unpkg.com/aos@2.3.1/dist/aos.js">

</script><script src="{% static 'js/app.js' %}"></script>
</body>
</html>
