{% load static %}
<!doctype html>
<html lang="en"><head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Kanban - TaskFlow</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="{% static 'css/app.css' %}" rel="stylesheet">
</head>
<body>
    <div class="container py-4"><h4 class="mb-3">Kanban Board</h4>
        <div class="row g-3"><div class="col-md-4"><div class="glass-card p-3"><h6>Todo</h6>
            <div class="kanban-column d-grid gap-2"><div draggable="true" class="glass-card p-3 kanban-card">Wireframe settings page</div>
            <div draggable="true" class="glass-card p-3 kanban-card">Draft release notes</div>
        </div>
    </div>
</div>
<div class="col-md-4"><div class="glass-card p-3"><h6>In Progress</h6><div class="kanban-column d-grid gap-2"><div draggable="true" class="glass-card p-3 kanban-card">Build reports API</div>
</div>
</div>
</div>
<div class="col-md-4"><div class="glass-card p-3"><h6>Done</h6><div class="kanban-column d-grid gap-2"><div draggable="true" class="glass-card p-3 kanban-card">Deploy v2 dashboard</div>
</div>
</div>
</div>
</div>
</div>
<script src="{% static 'js/app.js' %}"></script>
</body>
</html>
