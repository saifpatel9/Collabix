<aside class="saas-sidebar glass-panel" id="appSidebar">
  <div class="d-flex align-items-center justify-content-between mb-4">
    <a href="#" class="brand-logo"><i class="fa-solid fa-cubes-stacked"></i> TaskOPad</a>
    <button class="btn btn-sm btn-icon d-lg-none" id="closeSidebar" type="button"><i class="fa-solid fa-xmark"></i></button>
  </div>

  <p class="sidebar-label">Workspace</p>
  <nav class="d-grid gap-1 mb-3">
    {% if dashboard_role == 'employee' %}
      <a href="#" class="side-link active"><i class="fa-solid fa-gauge-high"></i><span>My Dashboard</span></a>
      <a href="#" class="side-link"><i class="fa-solid fa-list-check"></i><span>Assigned Tasks</span></a>
      <a href="#" class="side-link"><i class="fa-solid fa-calendar-day"></i><span>Attendance</span></a>
      <a href="#" class="side-link"><i class="fa-solid fa-chart-line"></i><span>Performance</span></a>
      <a href="#" class="side-link"><i class="fa-regular fa-calendar"></i><span>Calendar</span></a>
      <a href="#" class="side-link"><i class="fa-regular fa-user"></i><span>Profile</span></a>
    {% else %}
      <a href="#" class="side-link active"><i class="fa-solid fa-gauge-high"></i><span>Overview</span></a>
      <a href="#" class="side-link"><i class="fa-solid fa-users"></i><span>Employees</span></a>
      <a href="#" class="side-link"><i class="fa-solid fa-diagram-project"></i><span>Projects</span></a>
      <a href="#" class="side-link"><i class="fa-solid fa-list-check"></i><span>Tasks</span></a>
      <a href="#" class="side-link"><i class="fa-solid fa-table-columns"></i><span>Kanban</span></a>
      <a href="#" class="side-link"><i class="fa-solid fa-chart-pie"></i><span>Reports</span></a>
      <a href="#" class="side-link"><i class="fa-regular fa-calendar"></i><span>Calendar</span></a>
    {% endif %}
  </nav>

  <p class="sidebar-label">Support</p>
  <nav class="d-grid gap-1">
    <a href="#" class="side-link"><i class="fa-regular fa-bell"></i><span>Notifications</span><span class="badge rounded-pill text-bg-danger ms-auto">5</span></a>
    <a href="#" class="side-link"><i class="fa-solid fa-gear"></i><span>Settings</span></a>
    <a href="#" class="side-link"><i class="fa-solid fa-right-from-bracket"></i><span>Logout</span></a>
  </nav>
</aside>
