{% extends "base.html" %}
{% block body %}
<main class="grid min-h-screen place-items-center bg-grid px-4">
    <section class="max-w-md rounded-3xl border border-slate-200 bg-white p-8 text-center shadow-xl">
        <h1 class="text-3xl font-extrabold">Check your email</h1>
        <p class="mt-3 text-sm text-slate-500">If an account exists for that address, password reset instructions have been sent.</p>
        <a href="{% url 'accounts:login' %}" class="mt-6 inline-flex rounded-2xl bg-slate-900 px-4 py-3 text-sm font-bold text-white">Back to login</a>
    </section>
</main>
{% endblock body %}
