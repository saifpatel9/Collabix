{% extends "accounts/login.html" %}
{% block title %}Forgot Password | {{ APP_NAME }}{% endblock title %}
{% block body %}
<main class="grid min-h-screen place-items-center bg-grid px-4 py-10">
    <section class="w-full max-w-md rounded-3xl border border-slate-200 bg-white p-8 shadow-xl dark:border-slate-800 dark:bg-slate-900">
        <h1 class="text-3xl font-extrabold">Reset password</h1>
        <p class="mt-2 text-sm text-slate-500">Enter your email address and we will send reset instructions.</p>
        <form method="post" class="mt-6 space-y-5">
            {% csrf_token %}
            {{ form.email }}
            <button class="w-full rounded-2xl bg-slate-900 px-4 py-3 text-sm font-bold text-white">Send reset link</button>
        </form>
    </section>
</main>
{% endblock body %}
