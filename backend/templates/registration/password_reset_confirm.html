{% extends "base.html" %}
{% block body %}
<main class="grid min-h-screen place-items-center bg-grid px-4">
    <section class="w-full max-w-md rounded-3xl border border-slate-200 bg-white p-8 shadow-xl">
        <h1 class="text-3xl font-extrabold">Choose new password</h1>
        <form method="post" class="mt-6 space-y-5">
            {% csrf_token %}
            {{ form.as_p }}
            <button class="w-full rounded-2xl bg-slate-900 px-4 py-3 text-sm font-bold text-white">Reset password</button>
        </form>
    </section>
</main>
{% endblock body %}
