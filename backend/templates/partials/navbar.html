<header class="sticky top-0 z-30 border-b border-slate-200 bg-white/80 backdrop-blur dark:border-slate-800 dark:bg-slate-950/80">
    <div class="flex items-center justify-between px-4 py-4 sm:px-6 lg:px-8">
        <div class="flex flex-1 items-center gap-3">
            <button class="rounded-2xl border border-slate-200 px-3 py-2 lg:hidden dark:border-slate-700" x-on:click="sidebarOpen = true">
                Menu
            </button>
            <div>
                <p class="text-xs font-semibold uppercase tracking-[0.3em] text-slate-500">Internal workflow management</p>
                <h2 class="text-xl font-bold">Operations Dashboard</h2>
            </div>
        </div>

        <div class="hidden max-w-md flex-1 lg:block" x-data="{ open: false }">
            <input
                name="q"
                type="search"
                placeholder="Search Collabix"
                class="w-full rounded-2xl border border-slate-200 bg-white px-4 py-3 text-sm dark:border-slate-700 dark:bg-slate-900"
                hx-get="{% url 'core:global_search' %}"
                hx-trigger="keyup changed delay:250ms, search"
                hx-target="#global-search-results"
                x-on:focus="open = true"
            >
            <div id="global-search-results" class="relative" x-show="open" x-on:click.outside="open = false"></div>
        </div>

        <div class="flex items-center gap-3">
            {% if request.user.is_authenticated %}
                <div hx-get="{% url 'notifications:dropdown' %}" hx-trigger="load, every 30s" hx-swap="innerHTML"></div>
            {% endif %}
            {% if request.user.is_authenticated %}
                <span class="hidden text-sm font-semibold text-slate-600 dark:text-slate-300 sm:inline">{{ request.user.full_name }}</span>
            {% endif %}
            <button class="rounded-2xl border border-slate-200 px-3 py-2 text-sm dark:border-slate-700" x-on:click="darkMode = !darkMode">
                Theme
            </button>
            <button
                class="rounded-2xl border border-slate-200 px-3 py-2 text-sm dark:border-slate-700"
                hx-get="/api/v1/core/health/"
                hx-trigger="click"
                hx-swap="none"
            >
                Ping API
            </button>
            {% if request.user.is_authenticated %}
                <form method="post" action="{% url 'accounts:logout' %}">
                    {% csrf_token %}
                    <button class="rounded-2xl bg-slate-900 px-3 py-2 text-sm font-semibold text-white dark:bg-cyan-500 dark:text-slate-950">
                        Logout
                    </button>
                </form>
            {% endif %}
        </div>
    </div>
</header>
