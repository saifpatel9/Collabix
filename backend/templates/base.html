{% load static %}
<!DOCTYPE html>
<html lang="en" class="h-full" x-data="{ sidebarOpen: false, darkMode: false }" x-bind:class="{ 'dark': darkMode }">
<head>
    <meta charset="utf-8">
    <meta http-equiv="x-ua-compatible" content="ie=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}{{ APP_NAME }}{% endblock title %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'dist/css/app.css' %}">
    {% block extra_css %}{% endblock extra_css %}
</head>
<body class="min-h-full bg-slate-100 font-sans text-slate-900 dark:bg-slate-950 dark:text-slate-100">
    {% if messages %}
        <div class="fixed right-4 top-4 z-50 space-y-3">
            {% for message in messages %}
                <div class="rounded-2xl border border-slate-200 bg-white px-4 py-3 text-sm font-medium text-slate-800 shadow-xl dark:border-slate-700 dark:bg-slate-900 dark:text-slate-100">
                    {{ message }}
                </div>
            {% endfor %}
        </div>
    {% endif %}
    {% block body %}{% endblock body %}
    <script src="https://unpkg.com/htmx.org@1.9.12"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script defer src="{% static 'dist/js/app.js' %}"></script>
    {% block extra_js %}{% endblock extra_js %}
</body>
</html>
