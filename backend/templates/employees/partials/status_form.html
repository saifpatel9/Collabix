<form method="post" action="{% url 'employees:employee_status' employee.pk %}" class="mt-4 space-y-4" hx-post="{% url 'employees:employee_status' employee.pk %}" hx-target="body">
    {% csrf_token %}
    <select name="employment_status" class="w-full rounded-2xl border border-slate-200 bg-white px-4 py-3 text-sm dark:border-slate-700 dark:bg-slate-950">
        {% for value,label in status_choices %}
            <option value="{{ value }}" {% if employee.employment_status == value %}selected{% endif %}>{{ label }}</option>
        {% endfor %}
    </select>
    {% if request.user.role == "admin" or request.user.is_superuser or request.user.role == "manager" %}
        <button class="w-full rounded-2xl bg-slate-900 px-4 py-3 text-sm font-semibold text-white dark:bg-cyan-500 dark:text-slate-950">Update status</button>
    {% endif %}
</form>
