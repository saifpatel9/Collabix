<div class="mb-6 flex flex-col gap-4 sm:flex-row sm:items-center sm:justify-between">
    <div>
        {% if eyebrow %}<p class="text-xs font-semibold uppercase tracking-[0.3em] text-cyan-600">{{ eyebrow }}</p>{% endif %}
        <h1 class="mt-1 text-3xl font-extrabold text-slate-950 dark:text-white">{{ title }}</h1>
        {% if subtitle %}<p class="mt-2 max-w-2xl text-sm text-slate-600 dark:text-slate-300">{{ subtitle }}</p>{% endif %}
    </div>
    {% if action_url and action_label %}
        <a href="{{ action_url }}" class="inline-flex items-center justify-center rounded-2xl bg-slate-900 px-4 py-3 text-sm font-semibold text-white shadow-sm hover:bg-slate-800 dark:bg-cyan-500 dark:text-slate-950">
            {{ action_label }}
        </a>
    {% endif %}
</div>
