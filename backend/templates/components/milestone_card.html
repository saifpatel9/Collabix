<article class="rounded-2xl border border-slate-200 bg-white p-4 shadow-sm dark:border-slate-800 dark:bg-slate-900">
    <div class="flex items-start justify-between gap-3">
        <div>
            <h3 class="font-semibold text-slate-950 dark:text-white">{{ milestone.name }}</h3>
            <p class="mt-1 text-sm text-slate-500">{{ milestone.project.code }}{% if milestone.project.name %} - {{ milestone.project.name }}{% endif %}</p>
        </div>
        <span class="rounded-full px-3 py-1 text-xs font-semibold
            {% if milestone.status == 'completed' %}bg-emerald-100 text-emerald-700
            {% elif milestone.status == 'delayed' %}bg-red-100 text-red-700
            {% elif milestone.status == 'in_progress' %}bg-cyan-100 text-cyan-700
            {% else %}bg-slate-100 text-slate-700{% endif %}">
            {{ milestone.get_status_display }}
        </span>
    </div>
    <p class="mt-3 text-sm text-slate-600 dark:text-slate-300">{{ milestone.description|default:"No description provided." }}</p>
    <p class="mt-4 text-sm font-semibold">Due {{ milestone.due_date }}</p>
</article>
