<span class="inline-flex rounded-full px-3 py-1 text-xs font-bold
{% if status == 'approved' %}bg-emerald-100 text-emerald-800
{% elif status == 'rejected' %}bg-red-100 text-red-800
{% elif status == 'pending' %}bg-amber-100 text-amber-800
{% elif status == 'cancelled' %}bg-slate-100 text-slate-700
{% else %}bg-cyan-100 text-cyan-800{% endif %}">
    {{ label|default:status|title }}
</span>
