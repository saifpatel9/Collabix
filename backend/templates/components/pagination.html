{% if is_paginated %}
<nav class="mt-6 flex items-center justify-between text-sm" aria-label="Pagination">
    <div class="text-slate-500">
        Page {{ page_obj.number }} of {{ page_obj.paginator.num_pages }}
    </div>
    <div class="flex gap-2">
        {% if page_obj.has_previous %}
            <a class="rounded-xl border border-slate-200 px-3 py-2 font-semibold dark:border-slate-700"
               hx-get="?page={{ page_obj.previous_page_number }}"
               hx-target="{{ target|default:'#table-region' }}"
               hx-push-url="true"
               href="?page={{ page_obj.previous_page_number }}">Previous</a>
        {% endif %}
        {% if page_obj.has_next %}
            <a class="rounded-xl border border-slate-200 px-3 py-2 font-semibold dark:border-slate-700"
               hx-get="?page={{ page_obj.next_page_number }}"
               hx-target="{{ target|default:'#table-region' }}"
               hx-push-url="true"
               href="?page={{ page_obj.next_page_number }}">Next</a>
        {% endif %}
    </div>
</nav>
{% endif %}
