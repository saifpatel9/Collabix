<article class="rounded-2xl border border-slate-200 bg-white p-5 shadow-sm dark:border-slate-800 dark:bg-slate-900">
    <div class="flex items-start justify-between gap-4">
        <div>
            <p class="text-xs font-semibold uppercase tracking-[0.2em] text-cyan-600">{{ team.department.name }}</p>
            <h2 class="mt-2 text-lg font-bold text-slate-950 dark:text-white">
                <a href="{% url 'projects:team_detail' team.pk %}">{{ team.name }}</a>
            </h2>
        </div>
        <span class="rounded-full px-3 py-1 text-xs font-semibold {% if team.is_active %}bg-emerald-100 text-emerald-700{% else %}bg-slate-100 text-slate-600{% endif %}">
            {% if team.is_active %}Active{% else %}Archived{% endif %}
        </span>
    </div>
    <p class="mt-3 line-clamp-2 text-sm text-slate-600 dark:text-slate-300">{{ team.description|default:"No description provided." }}</p>
    <div class="mt-5 text-sm">
        <p class="text-slate-500">Team Lead</p>
        <p class="font-semibold">{{ team.team_lead.user.full_name|default:"Unassigned" }}</p>
    </div>
</article>
