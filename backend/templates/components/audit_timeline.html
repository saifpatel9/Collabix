<div class="space-y-4">
    {% for log in audit_logs %}
        <div class="rounded-2xl border border-slate-200 bg-white p-4 dark:border-slate-800 dark:bg-slate-900">
            <p class="text-sm font-semibold">{{ log.user.full_name|default:"System" }} {{ log.action }} {{ log.model_name }}</p>
            <p class="mt-1 text-xs text-slate-500">{{ log.timestamp|date:"M d, Y H:i" }} - {{ log.object_id }}</p>
        </div>
    {% empty %}
        <p class="text-sm text-slate-500">No audit events recorded.</p>
    {% endfor %}
</div>
