{% with status=project.status|default:status %}
<span class="inline-flex items-center rounded-full px-3 py-1 text-xs font-semibold
    {% if status == 'active' %}bg-emerald-100 text-emerald-700 dark:bg-emerald-500/15 dark:text-emerald-300
    {% elif status == 'completed' %}bg-cyan-100 text-cyan-700 dark:bg-cyan-500/15 dark:text-cyan-300
    {% elif status == 'on_hold' %}bg-amber-100 text-amber-700 dark:bg-amber-500/15 dark:text-amber-300
    {% elif status == 'cancelled' %}bg-red-100 text-red-700 dark:bg-red-500/15 dark:text-red-300
    {% else %}bg-slate-100 text-slate-700 dark:bg-slate-800 dark:text-slate-300{% endif %}">
    {{ project.get_status_display|default:label }}
</span>
{% endwith %}
