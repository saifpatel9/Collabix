<div class="space-y-3">
    {% for assignment in assignments %}
        <div class="rounded-2xl border border-slate-200 bg-white p-4 dark:border-slate-800 dark:bg-slate-900">
            <p class="text-sm font-bold">{{ assignment.reporting_manager.user.full_name }}</p>
            <p class="mt-1 text-sm text-slate-600 dark:text-slate-300">
                manages <span class="font-semibold">{{ assignment.employee.user.full_name }}</span>
            </p>
            <p class="mt-1 text-xs text-slate-500">Effective {{ assignment.effective_from|date:"M d, Y" }}</p>
        </div>
    {% empty %}
        <p class="text-sm text-slate-500">No active reporting hierarchy has been configured.</p>
    {% endfor %}
</div>
