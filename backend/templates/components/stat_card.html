<div class="rounded-3xl border border-slate-200 bg-white p-6 shadow-sm dark:border-slate-800 dark:bg-slate-900">
    <div class="flex items-start justify-between gap-4">
        <div>
            <p class="text-sm font-semibold text-slate-500">{{ label }}</p>
            <p class="mt-3 text-4xl font-extrabold text-slate-950 dark:text-white">{{ value }}</p>
        </div>
        {% if badge %}<span class="rounded-full bg-cyan-100 px-3 py-1 text-xs font-bold text-cyan-800">{{ badge }}</span>{% endif %}
    </div>
    {% if caption %}<p class="mt-3 text-xs font-medium text-slate-500">{{ caption }}</p>{% endif %}
</div>
