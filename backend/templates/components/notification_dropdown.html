<div class="relative" x-data="{ open: false }">
    <button class="relative rounded-2xl border border-slate-200 px-3 py-2 text-sm dark:border-slate-700" x-on:click="open = !open">
        Notifications
        {% if unread_count %}
            <span class="absolute -right-2 -top-2 grid h-5 min-w-5 place-items-center rounded-full bg-cyan-500 px-1 text-xs font-bold text-slate-950">{{ unread_count }}</span>
        {% endif %}
    </button>
    <div class="absolute right-0 top-12 z-50 w-80 overflow-hidden rounded-2xl border border-slate-200 bg-white shadow-2xl dark:border-slate-800 dark:bg-slate-900" x-show="open" x-on:click.outside="open = false">
        <div class="flex items-center justify-between border-b border-slate-100 px-4 py-3 dark:border-slate-800">
            <h3 class="font-bold">Notifications</h3>
            <form method="post" action="{% url 'notifications:mark_all_read' %}" hx-post="{% url 'notifications:mark_all_read' %}" hx-target="closest .relative" hx-swap="outerHTML">
                {% csrf_token %}
                <button class="text-xs font-semibold text-cyan-700">Mark all read</button>
            </form>
        </div>
        <div class="max-h-96 overflow-y-auto">
            {% for notification in notifications %}
                <form method="post" action="{% url 'notifications:mark_read' notification.pk %}" hx-post="{% url 'notifications:mark_read' notification.pk %}" hx-target="closest .relative" hx-swap="outerHTML">
                    {% csrf_token %}
                    <button class="block w-full border-b border-slate-100 px-4 py-3 text-left hover:bg-slate-50 dark:border-slate-800 dark:hover:bg-slate-800">
                        <span class="text-sm font-semibold {% if not notification.is_read %}text-cyan-700{% endif %}">{{ notification.title }}</span>
                        <span class="mt-1 block text-xs text-slate-500">{{ notification.message }}</span>
                    </button>
                </form>
            {% empty %}
                <p class="px-4 py-5 text-sm text-slate-500">No notifications yet.</p>
            {% endfor %}
        </div>
    </div>
</div>
