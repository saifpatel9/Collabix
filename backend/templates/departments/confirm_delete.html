{% extends "layouts/dashboard.html" %}

{% block content %}
{% include "components/page_header.html" with eyebrow="Organization" title="Delete Department" subtitle="This action permanently removes the department." %}
<form method="post" class="max-w-xl rounded-3xl border border-red-200 bg-white p-6 shadow-sm dark:bg-slate-900">
    {% csrf_token %}
    <p class="text-sm text-slate-600 dark:text-slate-300">Delete <strong>{{ object.name }}</strong>?</p>
    <div class="mt-6 flex gap-3">
        <button class="rounded-2xl bg-red-600 px-5 py-3 text-sm font-semibold text-white">Delete</button>
        <a href="{% url 'employees:department_detail' object.pk %}" class="rounded-2xl border border-slate-200 px-5 py-3 text-sm font-semibold">Cancel</a>
    </div>
</form>
{% endblock content %}
